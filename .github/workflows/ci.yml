name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  plugin:
    name: Plugin checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Lint PHP files
        run: find wp-content/plugins/delete-disable-comments tests/php -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run regression tests
        run: npm test

      - name: Check release scripts
        run: shellcheck scripts/build-release.sh scripts/verify-release.sh

      - name: Verify reproducible release artifact
        run: npm run verify:release

      - name: Upload verified plugin ZIP
        uses: actions/upload-artifact@v7
        with:
          name: delete-disable-comments
          path: |
            dist/delete-disable-comments.zip
            dist/delete-disable-comments.zip.sha256
          if-no-files-found: error
